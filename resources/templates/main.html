<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuralFix</title>
    <link rel="stylesheet" th:href="@{/main.css}" href="main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zeyada&display=swap" rel="stylesheet">
    <style>
        body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  padding: 0;
  background: #f8f9fa;
  color: #333;
}

.hero-image {
  background-image: url("images/istockphoto-484949147-612x612.jpg");
  background-color: #cccccc;
  height: 100vh;
  width: 100vw;
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
  position: fixed;
  bottom: 0;
  left: 0;
  opacity: 0.3;
  z-index: -1;
}

.logo {
  width: 120px;
  height: auto;
  margin: 20px auto;
  display: block;
  mix-blend-mode: multiply;
}

.RuralFix {
  font-size: 2.8rem;
  font-family: 'Times New Roman', Times, serif;
  text-align: center;
  margin-top: 10px;
}

.intro {
  text-align: center;
  padding: 30px;
}

.btn {
  display: inline-block;
  padding: 10px 20px;
  margin-top: 60px;
  background-color: #0066cc;
  color: white;
  text-decoration: none;
  border-radius: 5px;
  font-size: 16px;
  transition: background 0.3s ease;
}

.btn:hover { background-color: #004a99; }

footer {
  text-align: center;
  padding: 5px;
  background-color: #e9ecef;
  margin-top: 5%;
}

.form-section {
  background: rgba(255, 255, 255, 0.75);
  backdrop-filter: blur(6px);
  border-radius: 15px;
  max-width: 700px;
  margin: 60px auto;
  padding: 25px;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
  z-index: 2;
  position: relative;
}

.form-section h2 {
  font-size: 2rem;
  color: #004a99;
  text-align: center;
  margin-bottom: 30px;
}

.report-form {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.report-form .form-group {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
}

.report-form label {
  font-weight: 600;
  color: #222;
  margin-bottom: 6px;
  display: block;
}

.report-form input,
.report-form textarea,
.report-form select {
  padding: 12px 16px;
  font-size: 1rem;
  border: 1px solid #ccc;
  border-radius: 10px;
  width: 100%;
  background-color: #f9f9f9;
  transition: all 0.3s ease;
}

/* Auto-filled read-only fields */
.report-form input[readonly] {
  background-color: #eef3fb;
  border-color: #b0c8f0;
  color: #333;
  cursor: not-allowed;
}

.prefilled-hint {
  font-size: 0.78rem;
  color: #6c8bc4;
  margin-top: 4px;
}

.report-form textarea {
  resize: vertical;
  min-height: 100px;
}

.report-form input:focus,
.report-form textarea:focus,
.report-form select:focus {
  border-color: #007bff;
  background-color: #fff;
  outline: none;
  box-shadow: 0 0 6px rgba(0, 123, 255, 0.4);
}

.report-form button.btn {
  align-self: center;
  background: linear-gradient(to right, #007bff, #004a99);
  padding: 12px 30px;
  font-size: 1.1rem;
  border: none;
  border-radius: 50px;
  color: white;
  cursor: pointer;
  transition: background 0.3s ease;
}

.report-form button.btn:hover {
  background: linear-gradient(to right, #004a99, #003c7a);
}

.voice-recording-container {
  margin-top: 15px;
  border: 1px dashed #ccc;
  padding: 15px;
  border-radius: 10px;
  background-color: #f9f9f9;
}

.voice-recording-controls {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-top: 10px;
}

.voice-recording-btn {
  padding: 8px 15px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
}

.record-btn { background-color: #dc3545; color: white; }
.stop-btn   { background-color: #28a745; color: white; }

.recording-status {
  margin-left: 10px;
  font-size: 0.9rem;
  color: #666;
}

.recording-indicator {
  display: inline-block;
  width: 12px; height: 12px;
  background-color: #dc3545;
  border-radius: 50%;
  margin-right: 5px;
  animation: pulse 1.5s infinite;
}

.audio-preview {
  margin-top: 15px;
  width: 100%;
}

@keyframes pulse {
  0%   { opacity: 1; }
  50%  { opacity: 0.5; }
  100% { opacity: 1; }
}

/* Pincode loading spinner */
.pincode-loading {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid #b0c8f0;
  border-top-color: #0066cc;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 5px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@media screen and (max-width: 768px) {
  .hero-image { opacity: 0.15; }
  .logo { width: 80px; margin: 30px auto 10px; }
  .RuralFix { font-size: 1.8rem; margin-top: 10px; padding: 0 15px; word-wrap: break-word; }
  header { text-align: center; padding: 10px; }
  header p { font-size: 0.85rem; padding: 0 15px; text-align: center; }
  .form-section { background: rgba(255,255,255,0.7); padding: 15px; margin: 40px 10px; }
  .report-form .form-group { flex-direction: column; gap: 10px; }
  .report-form label,
  .report-form input,
  .report-form textarea,
  .report-form select { font-size: 0.95rem; }
  .report-form button.btn { width: 100%; padding: 10px; font-size: 1rem; margin-top: 30px; }
  .voice-recording-controls { flex-direction: column; align-items: flex-start; }
}
    </style>
</head>

<body class="landing-page">
<div class="hero-image"></div>

<header>
    <img th:src="@{/images/Karnatka-Gov-Logo.png}"
         src="images/the-karnataka-government-kannada-logo-png_seeklogo-407164.png"
         alt="Karnataka Govt Logo" class="logo">
    <div class="RuralFix"><center>RuralFix - Village Problem Reporting System</center></div>
    <p><center>Empowering Rural Karnataka through Technology &amp; Transparency</center></p>
</header>

<section class="form-section">
    <!--
        BACKEND NOTE — In ReportController.showReportForm():
            String email = authentication.getName();           // or principal.getAttribute("email") for OAuth2
            User user = userRepository.findByEmail(email);
            Report report = new Report();
            report.setName(user.getName());
            report.setEmail(user.getEmail());
            model.addAttribute("report", report);
    -->
    <form class="report-form"
          th:object="${report}"
          th:action="@{/report/submit}"
          method="post"
          enctype="multipart/form-data">

        <h2>Report a Problem</h2>

        <!-- Name — pre-filled & read-only -->
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" th:field="*{name}" required
                   pattern="[A-Za-z\s.]{2,50}"
                   title="Only letters, spaces, and full stops allowed (2–50 characters)"
                   readonly>
            <p class="prefilled-hint">Auto-filled from your account</p>
        </div>

        <!-- Email — pre-filled & read-only -->
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" th:field="*{email}" required readonly>
            <p class="prefilled-hint">Auto-filled from your account</p>
        </div>

        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" th:field="*{phone}" required
                   placeholder="Enter 10 digit phone number"
                   pattern="^[6-9]\d{9}$"
                   title="Enter a valid 10 digit phone number"
                   oninput="this.value = this.value.replace(/[^0-9]/g, '').substring(0, 10)"
                   maxlength="10">
        </div>

        <div class="form-group">
            <label for="aadhaar">Aadhaar Number</label>
            <input type="text" id="aadhaar" th:field="*{aadhaar}" required maxlength="12"
                   pattern="\d{12}" title="Enter exactly 12 digits. No letters allowed."
                   oninput="this.value = this.value.replace(/[^0-9]/g, '')">
        </div>

        <div class="form-group">
            <label for="state">State</label>
            <input type="text" id="state" th:field="*{state}"
                   value="Karnataka" readonly
                   style="background-color: #e9ecef; cursor: not-allowed;">
        </div>

        <!-- Pincode — triggers auto-fill of District, Taluk, Village -->
        <div class="form-group">
            <label for="pincode">Pincode</label>
            <input type="text" id="pincode" th:field="*{pincode}" pattern="\d{6}" maxlength="6"
                   inputmode="numeric" required title="Enter a 6-digit pincode."
                   placeholder="Enter 6-digit pincode"
                   oninput="this.value = this.value.replace(/[^0-9]/g, '');
                            if(this.value.length === 6) fetchPincodeData(this.value);
                            else clearPincodeFields();">
            <p id="pincode-status" class="prefilled-hint"></p>
        </div>

        <!-- District — auto-filled from pincode -->
        <div class="form-group">
            <label for="district">District</label>
            <input type="text" id="district" th:field="*{district}" required readonly
                   placeholder="Auto-filled when pincode is entered">
            <p class="prefilled-hint">Auto-filled from pincode</p>
        </div>

        <!-- Taluk — auto-filled from pincode -->
        <div class="form-group">
            <label for="taluk">Taluk / Block</label>
            <input type="text" id="taluk" th:field="*{taluk}" required readonly
                   placeholder="Auto-filled when pincode is entered">
            <p class="prefilled-hint">Auto-filled from pincode</p>
        </div>

        <!-- Village — dropdown populated from pincode -->
        <div class="form-group">
            <label for="village">Village / Post Office</label>
            <select id="village" th:field="*{village}" required>
                <option value="" disabled selected hidden>Enter pincode first</option>
            </select>
        </div>

        <div class="form-group">
            <label for="address">Address</label>
            <input type="text" id="address" th:field="*{address}" required
                   placeholder="House / Street / Landmark">
        </div>

        <div class="form-group">
            <label for="problemDomain">Problem Domain</label>
            <select id="problemDomain" th:field="*{problemDomain}" required>
                <option value="" disabled selected hidden>Select Problem Domain</option>
                <option value="WATER_SUPPLY">Water Supply</option>
                <option value="ELECTRICITY">Electricity</option>
                <option value="ROAD_DAMAGE">Road Damage</option>
                <option value="SANITATION">Sanitation</option>
                <option value="HOSPITAL_ACCESSIBILITY">Hospital Accessibility</option>
                <option value="RATION_SOCIETY">Ration Society</option>
                <option value="TRANSPORTATION">Transportation</option>
                <option value="DRAINAGE">Drainage</option>
                <option value="OTHERS">Others</option>
            </select>
        </div>

        <div class="form-group">
            <label for="description">Problem Description (Text)</label>
            <textarea id="description" th:field="*{description}" minlength="15"
                      placeholder="Describe the issue in at least 15 characters"></textarea>
        </div>

        <div class="form-group">
            <label>Or Record Voice Description</label>
            <div class="voice-recording-container">
                <div class="voice-recording-controls">
                    <button type="button" class="voice-recording-btn record-btn" id="startRecording">
                        <i class="fas fa-microphone"></i> Start Recording
                    </button>
                    <button type="button" class="voice-recording-btn stop-btn" id="stopRecording" disabled>
                        <i class="fas fa-stop"></i> Stop
                    </button>
                    <span class="recording-status" id="recordingStatus">Not recording</span>
                </div>
                <audio controls class="audio-preview" id="audioPreview" style="display: none;"></audio>
                <input type="file" id="audioFile" name="audioFile" style="display:none;" accept="audio/*">
            </div>
        </div>

        <button type="submit" class="btn">Submit</button>

    </form>
</section>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<script>
    // ── India Post Pincode API ────────────────────────────────────────
    async function fetchPincodeData(pincode) {
        const statusEl  = document.getElementById('pincode-status');
        const districtEl = document.getElementById('district');
        const talukEl   = document.getElementById('taluk');
        const villageEl = document.getElementById('village');

        // Show loading state
        statusEl.innerHTML = '<span class="pincode-loading"></span> Fetching location data...';
        statusEl.style.color = '#6c8bc4';
        districtEl.value = '';
        talukEl.value = '';
        villageEl.innerHTML = '<option value="" disabled selected hidden>Loading...</option>';

        try {
            const response = await fetch(`https://api.postalpincode.in/pincode/${pincode}`);
            const data = await response.json();

            if (data[0].Status === 'Success') {
                const postOffices = data[0].PostOffice;

                // Auto-fill District and Taluk/Block from first result
                districtEl.value = postOffices[0].District;
                talukEl.value    = postOffices[0].Block;

                // Populate Village dropdown with all post offices under this PIN
                villageEl.innerHTML = '<option value="" disabled selected hidden>Select Village / Post Office</option>';
                postOffices.forEach(po => {
                    const opt = document.createElement('option');
                    opt.value       = po.Name;
                    opt.textContent = po.Name + (po.BranchType ? ` (${po.BranchType})` : '');
                    villageEl.appendChild(opt);
                });

                // If only one post office, auto-select it
                if (postOffices.length === 1) {
                    villageEl.value = postOffices[0].Name;
                }

                statusEl.innerHTML = `<span style="color:#28a745">✓</span> Found ${postOffices.length} post office(s) in ${postOffices[0].District}`;
                statusEl.style.color = '#28a745';

            } else {
                statusEl.innerHTML = '<span style="color:#dc3545">✗</span> Invalid pincode. Please check and retry.';
                statusEl.style.color = '#dc3545';
                clearPincodeFields();
            }
        } catch (err) {
            statusEl.innerHTML = '<span style="color:#dc3545">✗</span> Could not fetch data. Check your connection.';
            statusEl.style.color = '#dc3545';
            console.error('Pincode fetch error:', err);
            clearPincodeFields();
        }
    }

    function clearPincodeFields() {
        document.getElementById('district').value = '';
        document.getElementById('taluk').value    = '';
        document.getElementById('village').innerHTML =
            '<option value="" disabled selected hidden>Enter pincode first</option>';
        const statusEl = document.getElementById('pincode-status');
        if (statusEl) statusEl.textContent = '';
    }
    // ─────────────────────────────────────────────────────────────────

    // ── Back/Forward button security ─────────────────────────────────
    history.replaceState(null, '', window.location.href);
    window.addEventListener('popstate', function () { window.location.replace('/login'); });
    window.addEventListener('pageshow', function (e) { if (e.persisted) window.location.replace('/login'); });
    // ─────────────────────────────────────────────────────────────────

    document.addEventListener('DOMContentLoaded', function () {
        const startBtn            = document.getElementById('startRecording');
        const stopBtn             = document.getElementById('stopRecording');
        const recordingStatus     = document.getElementById('recordingStatus');
        const audioPreview        = document.getElementById('audioPreview');
        const audioDataInput      = document.getElementById('audioFile');
        const descriptionTextarea = document.getElementById('description');

        let mediaRecorder;
        let audioChunks = [];

        if (!navigator.mediaDevices || !window.MediaRecorder) {
            document.querySelector('.voice-recording-container').innerHTML =
                '<p style="color: #dc3545;">Voice recording is not supported in your browser. Please use the text description.</p>';
            return;
        }

        startBtn.addEventListener('click', async function () {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);

                mediaRecorder.ondataavailable = function (e) {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };

                mediaRecorder.onstop = function () {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    audioChunks = [];
                    const audioUrl = URL.createObjectURL(audioBlob);
                    audioPreview.src = audioUrl;
                    audioPreview.style.display = 'block';
                    const audioFile = new File([audioBlob], 'voice-recording.webm', { type: 'audio/webm' });
                    const dataTransfer = new DataTransfer();
                    dataTransfer.items.add(audioFile);
                    document.getElementById('audioFile').files = dataTransfer.files;
                };

                mediaRecorder.start();
                startBtn.disabled = true;
                stopBtn.disabled  = false;
                recordingStatus.innerHTML = '<span class="recording-indicator"></span>Recording...';

                setTimeout(() => {
                    if (mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                        stream.getTracks().forEach(track => track.stop());
                        startBtn.disabled = false;
                        stopBtn.disabled  = true;
                        recordingStatus.textContent = 'Recording stopped (max time reached)';
                    }
                }, 120000);

            } catch (error) {
                console.error('Error accessing microphone:', error);
                recordingStatus.textContent = 'Error accessing microphone. Please check permissions.';
                startBtn.disabled = false;
            }
        });

        stopBtn.addEventListener('click', function () {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                startBtn.disabled = false;
                stopBtn.disabled  = true;
                recordingStatus.textContent = 'Recording complete';
            }
        });

        document.querySelector('form').addEventListener('submit', function (e) {
            if (!descriptionTextarea.value && !audioDataInput.value) {
                e.preventDefault();
                alert('Please provide either a text description or a voice recording');
            }
        });
    });
</script>
</body>
</html>
