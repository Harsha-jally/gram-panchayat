<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — RuralFix</title>

    <link href="https://fonts.googleapis.com/css2?family=Zeyada&display=swap" rel="stylesheet">
<style>
    body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: #f8f9fa;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    }

    /* Background */
    .hero-image {
    background-image: url("images/istockphoto-484949147-612x612.jpg");
    height: 100vh;
    width: 100vw;
    position: fixed;
    top: 0;
    left: 0;

    background-position: center center;   /* 🔥 center properly */
    background-size: cover;
    background-repeat: no-repeat;

    opacity: 0.15;
    z-index: -1;
}

    /* Header */
    header {
    text-align: center;
    padding: 20px;
    }

    .logo {
    width: 80px;
    mix-blend-mode: multiply;
    filter: brightness(0.95) contrast(1.1);
}

    .RuralFix-Title {
    font-size: 2.5rem;
    color: #004aad;
    font-weight: bold;
    }

    /* Container */
    .auth-container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    }

    /* Card */
    .card {
    background: rgba(255,255,255,0.97);
    border-radius: 14px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.12);
    width: 100%;
    max-width: 450px;
    border: 1px solid #ddd;
    }

    /* Tabs */
    .tabs {
    display: flex;
    background: #f1f1f1;
    }

    .tab {
    flex: 1;
    padding: 15px;
    cursor: pointer;
    font-weight: 600;
    color: #666;
    border: none;
    background: none;
    transition: 0.2s;
    }

    .tab.active {
    background: #fff;
    color: #004aad;
    border-bottom: 3px solid #004aad;
    }

    .tab:hover {
    background: #e9f0ff;
    }

    /* Panels */
    .panel {
    display: none;
    padding: 30px;
    }

    .panel.active {
    display: block;
    }

    /* Fields */
    .field {
    margin-bottom: 16px;
    }

    /* 🔥 SAME SIZE INPUTS + BUTTONS */
    input,
    .btn-user,
    .google-btn {
    width: 100%;
    height: 48px;
    padding: 0 14px;
    border-radius: 8px;
    font-size: 14.5px;
    box-sizing: border-box;
    }

    /* Inputs */
    input {
    border: 1px solid #ccc;
    transition: 0.2s;
    }

    input:focus {
    border-color: #004aad;
    box-shadow: 0 0 0 3px rgba(0,74,173,0.1);
    outline: none;
    }

    /* Login/Register Button */
    .btn-user {
    background: #004aad;
    color: white;
    border: none;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
    }

    .btn-user:hover {
    background: #003a8c;
    transform: translateY(-1px);
    }

    /* Divider */
    .divider {
    display: flex;
    align-items: center;
    margin: 20px 0;
    }

    .divider::before,
    .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: #ddd;
    }

    .divider span {
    margin: 0 10px;
    font-size: 13px;
    color: #777;
    }

    /* Google Button */
    .google-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: white;
    border: 1px solid #dadce0;
    font-weight: 600;
    color: #3c4043;
    text-decoration: none;
    transition: 0.2s;
    }

    .google-btn img {
    width: 20px;
    height: 20px;
    }

    .google-btn:hover {
    background: #f7f8f8;
    box-shadow: 0 3px 8px rgba(0,0,0,0.08);
    transform: translateY(-1px);
    }

    /* Switch text */
    .switch {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
    }

    .switch a {
    color: #004aad;
    font-weight: 600;
    cursor: pointer;
    }

    /* Footer */
    footer {
    text-align: center;
    padding: 15px;
    background: #e9ecef;
    }

    /* Mobile */
    @media (max-width: 768px) {
    .card {
    margin: 10px;
    }
    }
   </style>
</head>

<body>

<div class="hero-image"></div>

<header>
    <img th:src="@{/images/Karnatka-Gov-Logo.png}" class="logo">
    <div class="RuralFix-Title">RuralFix</div>
    <p>Village Problem Reporting System</p>
</header>

<div class="auth-container">
    <div class="card">

        <div class="tabs">
            <button class="tab" id="tab-login" onclick="show('login')">Sign In</button>
            <button class="tab" id="tab-signup" onclick="show('signup')">Sign Up</button>
        </div>

        <!-- LOGIN -->
        <div class="panel" id="panel-login">

            <form action="/login" method="post">
                <div class="field">
                    <input type="email" name="email" placeholder="Email" required>
                </div>

                <div class="field">
                    <input type="password" name="password" placeholder="Password" required>
                </div>

                <button class="btn-user">Login</button>
            </form>

            <div class="divider"><span>OR</span></div>

            <a href="/oauth2/authorization/google" class="google-btn">
                <img src="https://developers.google.com/identity/images/g-logo.png">
                Continue with Google
            </a>

            <div class="switch">
                New user? <a onclick="show('signup')">Create account</a>
            </div>
        </div>

        <!-- SIGNUP -->
        <div class="panel" id="panel-signup">
            <form action="/register" method="post">
                <div class="field">
                    <input type="text" name="name" placeholder="Full Name" required>
                </div>

                <div class="field">
                    <input type="tel" name="phone" placeholder="Phone Number" required>
                </div>

                <div class="field">
                    <input type="email" name="email" placeholder="Email" required>
                </div>

                <div class="field">
                    <input type="password" name="password" placeholder="Password" required>
                </div>

                <button class="btn-user">Register</button>
            </form>

            <div class="switch">
                Already have an account? <a onclick="show('login')">Sign in</a>
            </div>
        </div>

    </div>
</div>

<footer>
    © 2025 Government of Karnataka
</footer>

<script th:inline="javascript">
    // ── Back/Forward button security ──────────────────────────────────
    history.replaceState(null, '', '/login');

    window.addEventListener('pageshow', function (e) {
        if (e.persisted) window.location.reload();
    });
    // ─────────────────────────────────────────────────────────────────

    function show(tab) {
        ['login', 'signup'].forEach(t => {
            document.getElementById('tab-' + t).classList.remove('active');
            document.getElementById('panel-' + t).classList.remove('active');
        });
        document.getElementById('tab-' + tab).classList.add('active');
        document.getElementById('panel-' + tab).classList.add('active');
    }

    // If already logged in, skip login page entirely
    (function () {
        function hasJwt() {
            return document.cookie.split(';').some(c => c.trim().startsWith('jwt='));
        }
        if (hasJwt()) {
            window.location.replace('/index');
        }
    })();

    // Auto-open correct tab based on URL param or Thymeleaf error
    const params = new URLSearchParams(window.location.search);
    const hasRegError = /*[[${regError != null}]]*/ false;

    if (params.get('tab') === 'signup' || hasRegError) {
        show('signup');
    } else {
        show('login');
    }
</script>
</body>
</html>
